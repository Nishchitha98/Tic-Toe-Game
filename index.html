<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="hero-bg"></div>

    <main class="game-shell">

        <section class="game-panel">

            <header class="game-header">
                <h1 class="game-title">
                    Tic <span>Toe</span>
                </h1>

                <p class="game-subtitle">
                    Play with Strategy!
                </p>
            </header>

            <div id="status" class="status-pill">
                Player X Turn
            </div>

            <div id="board" class="board">

                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>

                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>

                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>

            </div>

            <div class="controls">
                <button id="reset" class="button">
                    New Game
                </button>
            </div>

            <div id="victory-screen" class="victory-screen hidden">

                <div class="victory-card">

                    <h2 class="victory-title">
                        Congratulations!
                    </h2>

                    <p id="victory-text" class="victory-text">
                        Player X Wins!
                    </p>

                    <button id="play-again" class="button victory-button">
                        Play Again
                    </button>

                </div>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
